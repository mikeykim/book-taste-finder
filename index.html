<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#F7F7F5">
<title>내 책 취향 찾기</title>
<link rel="manifest" href="manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Jua&family=Gowun+Dodum&display=swap" rel="stylesheet">
<style>
:root{
  --white:#fff;--bg:#F7F7F5;--card:#fff;
  --text:#37352F;--text2:#787774;--text3:#B4B4B0;
  --border:#E3E2DE;--hover:#F1F1EF;
  --pink:#FDE4E8;--mint:#D9F0E2;--peach:#FFE9D4;
  --lavender:#E8E0F6;--sky:#D8EAF4;--butter:#FFF2CC;
  --coral:#FACEBE;--sage:#D2E5CB;
  --char-body:#FDF0E4;--char-blush:#F7C9BA;
  --r-s:14px;--r-m:20px;--r-l:28px;--r-pill:50px;
  --sh-s:0 1px 3px rgba(0,0,0,.06);
  --sh-m:0 2px 8px rgba(0,0,0,.07);
  --sh-l:0 4px 16px rgba(0,0,0,.08);
  --pastel-pool:var(--pink),var(--mint),var(--peach),var(--lavender),var(--sky),var(--butter),var(--coral),var(--sage);
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{
  height:100%;width:100%;overflow:hidden;
  background:var(--bg);
  font-family:'Gowun Dodum','Apple SD Gothic Neo',sans-serif;
  color:var(--text);
  -webkit-font-smoothing:antialiased;
  -webkit-tap-highlight-color:transparent;
}
#app{
  max-width:430px;margin:0 auto;height:100%;
  display:flex;flex-direction:column;
  background:var(--card);
  position:relative;overflow:hidden;
}

/* ====== SCREENS ====== */
.screen{
  flex:1;overflow-y:auto;overflow-x:hidden;
  padding:16px 16px 0;
  display:none;flex-direction:column;
  -webkit-overflow-scrolling:touch;
}
.screen.active{display:flex;}
.screen-title{font-family:'Jua',sans-serif;font-size:1.4rem;font-weight:400;margin-bottom:2px;padding-top:10px;}
.screen-sub{font-size:.78rem;color:var(--text2);margin-bottom:12px;}

/* ====== BOTTOM NAV ====== */
#bottom-nav{
  flex-shrink:0;
  display:flex;justify-content:space-around;align-items:center;
  background:var(--card);
  padding:6px 4px calc(4px + env(safe-area-inset-bottom));
  box-shadow:0 -1px 6px rgba(0,0,0,.06);
}
.nav-btn{
  display:flex;flex-direction:column;align-items:center;gap:1px;
  background:none;border:none;
  font-family:'Gowun Dodum',sans-serif;font-size:.65rem;
  color:var(--text3);cursor:pointer;
  padding:4px 12px;border-radius:var(--r-m);
  transition:background .15s;
}
.nav-btn.active{color:var(--text);}
.nav-btn .ic{
  width:28px;height:28px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:.9rem;transition:background .15s;
}
.nav-btn.active .ic{background:var(--hover);}
.nav-btn .ico-gray{display:inline;filter:grayscale(1) opacity(.5);}
.nav-btn .ico-color{display:none;}
.nav-btn.active .ico-gray{display:none;}
.nav-btn.active .ico-color{display:inline;filter:none;}

/* ====== 1. CAPTURE SCREEN ====== */
#screen-capture{padding:10px 16px 0;justify-content:flex-start;}
.capture-header{text-align:center;margin-bottom:6px;}
.capture-header h1{font-family:'Jua',sans-serif;font-size:1.35rem;font-weight:400;}
.capture-header p{font-size:.78rem;color:var(--text2);margin-top:1px;}

.camera-wrap{
  position:relative;flex:1;min-height:0;
  border-radius:var(--r-l);overflow:hidden;
  background:#000;margin-bottom:6px;
}
#camera-feed{
  width:100%;height:100%;object-fit:cover;
  display:block;
}
.camera-wrap .corner{position:absolute;width:28px;height:28px;border:2.5px solid rgba(255,255,255,.6);}
.corner.tl{top:14px;left:14px;border-right:none;border-bottom:none;border-radius:10px 0 0 0;}
.corner.tr{top:14px;right:14px;border-left:none;border-bottom:none;border-radius:0 10px 0 0;}
.corner.bl{bottom:14px;left:14px;border-right:none;border-top:none;border-radius:0 0 0 10px;}
.corner.br{bottom:14px;right:14px;border-left:none;border-top:none;border-radius:0 0 10px 0;}
.camera-no{
  position:absolute;inset:0;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  color:var(--text3);font-size:.85rem;text-align:center;gap:8px;
  background:var(--bg);
}
.camera-no .ic{font-size:2rem;}

.shutter-row{
  display:flex;justify-content:center;align-items:center;
  padding-bottom:4px;position:relative;
}
#shutter-btn{
  width:64px;height:64px;border-radius:50%;
  background:var(--card);border:3px solid var(--text);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;box-shadow:var(--sh-m);
  transition:transform .1s;
}
#shutter-btn:active{transform:scale(.92);}
#shutter-btn .inner{width:44px;height:44px;border-radius:50%;background:var(--text);}
#gallery-btn{
  position:absolute;left:calc(50% - 90px);
  width:42px;height:42px;border-radius:var(--r-s);
  background:var(--hover);border:none;
  font-size:1.1rem;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
}
#gallery-input{display:none;}
.quokka-ask{
  position:absolute;right:calc(50% - 108px);top:50%;transform:translateY(-50%);
  display:flex;align-items:center;gap:4px;
}
.quokka-bubble{
  background:none;
  border-radius:var(--r-m);padding:0;
  font-family:'Jua',sans-serif;font-size:.7rem;color:var(--text2);
  white-space:nowrap;
}
.quokka-ask svg{flex-shrink:0;}

/* Canvas for capture */
#capture-canvas{display:none;}

/* ====== 2. MATCH RESULT ====== */
#screen-match{align-items:center;justify-content:flex-start;text-align:center;padding-top:40px;}
.match-verdict{font-family:'Jua',sans-serif;font-size:1.3rem;line-height:1.35;margin-bottom:8px;}
.match-verdict .hl{background:var(--butter);padding:1px 6px;border-radius:8px;}
.match-stage{display:flex;align-items:flex-end;justify-content:center;gap:12px;margin-bottom:14px;}
.match-cover{
  width:70px;height:100px;border-radius:8px;
  overflow:hidden;box-shadow:var(--sh-s);
}
.match-cover img{width:100%;height:100%;object-fit:cover;}
.match-cover .placeholder{
  width:100%;height:100%;display:flex;align-items:center;justify-content:center;
  font-family:'Jua',sans-serif;font-size:.7rem;text-align:center;padding:6px;
}
.match-bar-wrap{
  width:100%;background:var(--bg);border-radius:var(--r-m);
  padding:10px 14px;margin-bottom:10px;
}
.match-bar-head{display:flex;justify-content:space-between;align-items:center;font-size:.72rem;color:var(--text2);}
.match-bar-head .score{font-family:'Jua',sans-serif;font-size:1.2rem;color:var(--text);}
.match-bar{margin-top:5px;height:8px;border-radius:var(--r-pill);background:var(--border);overflow:hidden;}
.match-bar .fill{height:100%;border-radius:var(--r-pill);background:var(--sage);transition:width .6s ease;}
.match-reasons{display:flex;flex-direction:column;gap:5px;width:100%;margin-bottom:10px;text-align:left;}
.match-reason{
  background:var(--bg);border-radius:var(--r-m);
  padding:7px 12px;font-size:.72rem;
  display:flex;align-items:center;gap:8px;
}
.match-reason .chip{
  flex:0 0 auto;border-radius:var(--r-pill);
  padding:2px 9px;font-family:'Jua',sans-serif;font-size:.72rem;
}
.match-actions{display:flex;gap:8px;width:100%;}
.match-actions .btn{
  flex:1;font-family:'Jua',sans-serif;font-size:.88rem;
  padding:10px 4px;border:none;border-radius:var(--r-pill);
  background:var(--text);color:var(--white);cursor:pointer;
  box-shadow:var(--sh-s);
}
.match-actions .btn.ghost{background:var(--bg);color:var(--text);box-shadow:none;}

/* ====== 3. BOOKSHELF ====== */
#screen-shelf{padding-bottom:16px;}
.shelf-row{
  display:flex;align-items:flex-end;justify-content:flex-start;
  gap:8px;min-height:90px;padding:0 4px;flex-wrap:wrap;
}
.shelf-plank{height:3px;background:var(--border);border-radius:var(--r-pill);margin:0 0 14px;}
.shelf-book{
  width:32px;border-radius:4px 4px 2px 2px;
  box-shadow:var(--sh-s);cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  overflow:hidden;transition:transform .2s;
  position:relative;
}
.shelf-book:active{transform:translateY(-4px) rotate(-2deg);}
.shelf-book .spine{
  writing-mode:vertical-rl;
  font-family:'Jua',sans-serif;font-size:.5rem;
  color:var(--text);text-align:center;line-height:1.1;
  padding:4px 1px;max-height:80px;overflow:hidden;
}
.shelf-empty{
  text-align:center;padding:60px 20px;
  color:var(--text3);font-size:.88rem;line-height:1.6;
}
.shelf-empty .big{font-size:2rem;margin-bottom:8px;}

/* ====== 4. CHARACTER ====== */
#screen-character{align-items:center;padding-top:20px;}
.char-profile{
  width:100%;background:var(--bg);border-radius:var(--r-l);
  padding:18px 16px 14px;text-align:center;margin-bottom:14px;
}
.char-profile .name{font-family:'Jua',sans-serif;font-size:1.35rem;margin-top:4px;}
.char-profile .epithet{font-size:.82rem;margin-top:2px;}
.char-profile .basis{font-size:.7rem;color:var(--text3);margin-top:6px;}
.char-bars{width:100%;display:flex;flex-direction:column;gap:10px;margin-bottom:10px;}
.char-bar{display:flex;flex-direction:column;gap:2px;}
.char-bar .label{font-family:'Jua',sans-serif;font-size:.75rem;color:var(--text);}
.char-bar .bar-body{display:flex;align-items:center;gap:4px;}
.char-bar .bar-side{font-size:.6rem;color:var(--text3);width:36px;flex-shrink:0;}
.char-bar .bar-side:last-child{text-align:right;}
.char-bar .track{flex:1;height:8px;border-radius:var(--r-pill);background:var(--bg);overflow:hidden;}
.char-bar .fill{height:100%;border-radius:var(--r-pill);}
.char-tags{display:flex;flex-wrap:wrap;gap:5px;justify-content:center;}
.char-tags .tag{
  font-size:.7rem;padding:2px 10px;
  background:var(--bg);border-radius:var(--r-pill);color:var(--text2);
}
.char-empty{text-align:center;padding:60px 20px;color:var(--text3);font-size:.88rem;line-height:1.6;}
.char-empty .big{font-size:2rem;margin-bottom:8px;}

/* ====== 5. RECOMMENDATIONS ====== */
#screen-reco{padding-bottom:16px;}
.reco-card{
  background:var(--card);border-radius:var(--r-m);
  padding:10px;margin-bottom:8px;display:flex;gap:10px;
  box-shadow:var(--sh-s);
}
.reco-cover{
  flex:0 0 52px;height:76px;border-radius:8px;
  display:flex;align-items:center;justify-content:center;
  text-align:center;padding:4px;
  font-family:'Jua',sans-serif;font-size:.62rem;line-height:1.2;
}
.reco-body h4{font-family:'Jua',sans-serif;font-size:.95rem;font-weight:400;margin:0 0 1px;}
.reco-body .au{font-size:.65rem;color:var(--text3);margin:0 0 2px;}
.reco-body .why{font-size:.65rem;color:var(--text2);line-height:1.4;}
.reco-empty{text-align:center;padding:60px 20px;color:var(--text3);font-size:.88rem;line-height:1.6;}
.reco-empty .big{font-size:2rem;margin-bottom:8px;}

/* ====== POPUP (book detail) ====== */
.popup-overlay{
  position:fixed;inset:0;z-index:100;
  background:rgba(55,53,47,.3);
  backdrop-filter:blur(3px);-webkit-backdrop-filter:blur(3px);
  opacity:0;pointer-events:none;
  transition:opacity .25s;
  display:flex;align-items:center;justify-content:center;
  padding:24px;
}
.popup-overlay.open{opacity:1;pointer-events:auto;}
.popup-card{
  background:var(--card);border-radius:var(--r-l);
  box-shadow:var(--sh-l);width:100%;max-width:320px;
  padding:22px 20px 18px;
  transform:scale(.92) translateY(12px);
  transition:transform .3s cubic-bezier(.34,1.56,.64,1);
  text-align:center;position:relative;
  max-height:80vh;overflow-y:auto;
}
.popup-overlay.open .popup-card{transform:scale(1) translateY(0);}
.popup-close{
  position:absolute;top:12px;right:14px;
  width:28px;height:28px;border-radius:50%;
  background:var(--hover);border:none;
  font-size:.85rem;color:var(--text2);cursor:pointer;
}
.popup-cover-img{
  width:90px;height:130px;border-radius:8px;
  margin:0 auto 10px;overflow:hidden;
  box-shadow:var(--sh-s);
}
.popup-cover-img img{width:100%;height:100%;object-fit:cover;}
.popup-cover-color{
  width:90px;height:130px;border-radius:8px;
  margin:0 auto 10px;
  display:flex;align-items:center;justify-content:center;
  font-family:'Jua',sans-serif;font-size:.85rem;
  text-align:center;padding:8px;line-height:1.2;
}
.popup-title{font-family:'Jua',sans-serif;font-size:1.15rem;margin:0 0 2px;}
.popup-author{font-size:.75rem;color:var(--text2);margin:0 0 8px;}
.popup-stars{font-size:1rem;color:#E8A93A;letter-spacing:2px;margin-bottom:8px;}
.popup-tags{display:flex;flex-wrap:wrap;gap:4px;justify-content:center;margin-bottom:10px;}
.popup-tags .tag{font-size:.65rem;padding:2px 8px;background:var(--bg);border-radius:var(--r-pill);color:var(--text2);}
.popup-memo{
  background:var(--bg);border-radius:var(--r-m);
  padding:8px 10px;font-size:.75rem;line-height:1.5;text-align:left;
}
.popup-memo .memo-label{font-family:'Jua',sans-serif;font-size:.78rem;display:block;margin-bottom:3px;color:var(--text2);}
.popup-date{font-size:.65rem;color:var(--text3);margin-top:8px;}
.popup-delete{
  margin-top:10px;background:none;border:none;
  font-size:.72rem;color:var(--coral);cursor:pointer;
  padding:4px 12px;border-radius:var(--r-pill);
}

/* ====== LOADING OVERLAY ====== */
.loading-overlay{
  position:fixed;inset:0;z-index:200;
  background:var(--card);
  display:none;flex-direction:column;
  align-items:center;justify-content:center;
  gap:16px;text-align:center;
}
.loading-overlay.show{display:flex;}
.loading-text{font-family:'Jua',sans-serif;font-size:1.1rem;}
.loading-sub{font-size:.78rem;color:var(--text2);}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
.loading-anim{animation:bounce 1s ease infinite;}
</style>
</head>

  <symbol id="char-excited" viewBox="0 0 140 160">

<script>
/* =============================================
   DATABASE (IndexedDB)
============================================= */
const DB = {
  db: null,
  async open() {
    return new Promise((resolve, reject) => {
      const req = indexedDB.open('BookTasteDB', 1);
      req.onupgradeneeded = e => {
        const db = e.target.result;
        if (!db.objectStoreNames.contains('books')) {
          const store = db.createObjectStore('books', { keyPath: 'id', autoIncrement: true });
          store.createIndex('createdAt', 'createdAt');
        }
        if (!db.objectStoreNames.contains('character')) {
          db.createObjectStore('character', { keyPath: 'key' });
        }
      };
      req.onsuccess = e => { DB.db = e.target.result; resolve(); };
      req.onerror = e => reject(e.target.error);
    });
  },
  async saveBook(book) {
    return new Promise((resolve, reject) => {
      const tx = DB.db.transaction('books', 'readwrite');
      const req = tx.objectStore('books').add(book);
      req.onsuccess = () => resolve(req.result);
      req.onerror = e => reject(e.target.error);
    });
  },
  async getBooks() {
    return new Promise((resolve, reject) => {
      const tx = DB.db.transaction('books', 'readonly');
      const req = tx.objectStore('books').index('createdAt').openCursor(null, 'prev');
      const results = [];
      req.onsuccess = e => {
        const cursor = e.target.result;
        if (cursor) { results.push(cursor.value); cursor.continue(); }
        else resolve(results);
      };
      req.onerror = e => reject(e.target.error);
    });
  },
  async deleteBook(id) {
    return new Promise((resolve, reject) => {
      const tx = DB.db.transaction('books', 'readwrite');
      const req = tx.objectStore('books').delete(id);
      req.onsuccess = () => resolve();
      req.onerror = e => reject(e.target.error);
    });
  },
  async saveCharacter(data) {
    return new Promise((resolve, reject) => {
      const tx = DB.db.transaction('character', 'readwrite');
      const req = tx.objectStore('character').put({ key: 'main', ...data });
      req.onsuccess = () => resolve();
      req.onerror = e => reject(e.target.error);
    });
  },
  async getCharacter() {
    return new Promise((resolve, reject) => {
      const tx = DB.db.transaction('character', 'readonly');
      const req = tx.objectStore('character').get('main');
      req.onsuccess = () => resolve(req.result || null);
      req.onerror = e => reject(e.target.error);
    });
  }
};

/* =============================================
   CAMERA
============================================= */
const Camera = {
  stream: null,
  async start() {
    const video = document.getElementById('camera-feed');
    const noEl = document.getElementById('camera-no');
    try {
      this.stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 1920 } }
      });
      video.srcObject = this.stream;
      noEl.style.display = 'none';
    } catch (e) {
      console.warn('Camera unavailable:', e);
      noEl.style.display = 'flex';
    }
  },
  stop() {
    if (this.stream) {
      this.stream.getTracks().forEach(t => t.stop());
      this.stream = null;
    }
  },
  capture() {
    const video = document.getElementById('camera-feed');
    if (!video.srcObject) return null;
    const canvas = document.getElementById('capture-canvas');
    const maxW = 800;
    let w = video.videoWidth, h = video.videoHeight;
    if (w > maxW) { h = Math.round(h * maxW / w); w = maxW; }
    canvas.width = w; canvas.height = h;
    canvas.getContext('2d').drawImage(video, 0, 0, w, h);
    return canvas.toDataURL('image/jpeg', 0.82);
  }
};

/* =============================================
   AI (Mock → swap to real API later)
============================================= */
const PASTELS = ['var(--pink)','var(--mint)','var(--peach)','var(--lavender)','var(--sky)','var(--butter)','var(--coral)','var(--sage)'];
function randomPastel() { return PASTELS[Math.floor(Math.random() * PASTELS.length)]; }

const AI = {
  async analyzeCover(imageBase64) {
    // Vercel 배포 환경이면 실제 API, 아니면 Mock
    const isDeployed = location.hostname !== 'localhost' && location.hostname !== '127.0.0.1' && location.protocol !== 'file:';
    if (isDeployed) {
      const res = await fetch('/api/analyze', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ image: imageBase64 })
      });
      const data = await res.json().catch(() => null);
      if (!res.ok) {
        const errMsg = [data?.error, data?.detail, data?.rawText].filter(Boolean).join('\n\n');
        throw new Error(errMsg || ('HTTP ' + res.status));
      }
      if (!data || !data.title) throw new Error('응답에 책 정보가 없어요: ' + JSON.stringify(data).slice(0,200));
      return data;
    }
    // Mock (로컬 테스트용)
    await new Promise(r => setTimeout(r, 1500));
    const mockBooks = [
      { title:'아몬드', author:'손원평', year:'2017', tags:['감정','성장','한국문학'], matchScore:87, matchReasons:['잔잔하고 따뜻한 결','편하게 읽히는 소설','한국 현대 성장소설'], verdict:'마음이 따뜻해지는 책이야' },
      { title:'코스모스', author:'칼 세이건', year:'1980', tags:['과학','우주','경이'], matchScore:62, matchReasons:['경이롭고 웅장한 톤','천천히 곱씹는 깊이','과학 교양 에세이'], verdict:'밤하늘 보며 읽기 딱이야' },
      { title:'파친코', author:'이민진', year:'2017', tags:['역사','가족','서사'], matchScore:91, matchReasons:['묵직하고 감동적인 결','몰입하면 빠져드는 호흡','역사 가족 대하소설'], verdict:'한번 시작하면 멈출 수 없어' },
      { title:'미드나잇 라이브러리', author:'매트 헤이그', year:'2020', tags:['판타지','위로','선택'], matchScore:79, matchReasons:['따뜻하고 위로가 되는','가볍게 술술 읽히는 책','판타지 힐링 소설'], verdict:'지친 날에 읽으면 좋은 책이야' },
      { title:'데미안', author:'헤르만 헤세', year:'1919', tags:['성장','자아','고전'], matchScore:84, matchReasons:['고요하고 깊은 울림','곱씹으며 읽는 깊이','고전 성장 문학'], verdict:'조용한 밤에 읽기 딱이야' },
    ];
    return mockBooks[Math.floor(Math.random() * mockBooks.length)];
  },

  async generateCharacter(books) {
    if (books.length === 0) return null;

    // 태그 빈도 수집
    const tagCounts = {};
    books.forEach(b => (b.tags || []).forEach(t => { tagCounts[t] = (tagCounts[t] || 0) + 1; }));
    const sorted = Object.entries(tagCounts).sort((a, b) => b[1] - a[1]);
    const topTags = sorted.slice(0, 6).map(e => e[0]);

    // 5축 성향 분석 (태그 기반 추론)
    const has = (keywords) => keywords.some(k => topTags.some(t => t.includes(k)));
    const count = (keywords) => books.reduce((n, b) => n + (b.tags || []).filter(t => keywords.some(k => t.includes(k))).length, 0);
    const total = Math.max(1, books.length);

    // 난이도: 가벼운(에세이,일상) ↔ 깊은(철학,고전,사회)
    const light = count(['에세이','일상','가벼','위로','유머']);
    const deep = count(['철학','고전','사회','역사','과학','경제']);
    const diffPct = Math.min(95, Math.max(15, Math.round(deep / Math.max(1, light + deep) * 100)));

    // 분위기: 밝은(따뜻,유머,성장) ↔ 어두운(스릴러,아픔,비극)
    const bright = count(['따뜻','위로','성장','유머','가족','사랑']);
    const dark = count(['스릴러','아픔','비극','공포','미스터리','범죄']);
    const moodPct = Math.min(95, Math.max(15, Math.round(bright / Math.max(1, bright + dark) * 100)));

    // 범위: 개인(감정,자아,내면) ↔ 사회(역사,사회,경제)
    const personal = count(['감정','자아','내면','성장','사랑','일상']);
    const social = count(['역사','사회','경제','정치','전쟁','문명']);
    const scopePct = Math.min(95, Math.max(15, Math.round(personal / Math.max(1, personal + social) * 100)));

    // 장르 폭: 상위 2개 장르 집중도
    const topTwo = sorted.slice(0, 2).reduce((s, e) => s + e[1], 0);
    const allTags = sorted.reduce((s, e) => s + e[1], 0);
    const focusPct = Math.min(95, Math.max(15, Math.round(topTwo / Math.max(1, allTags) * 100)));

    // 호흡: 짧은(시,에세이,단편) ↔ 긴(서사,대하,시리즈)
    const shortForm = count(['시','에세이','단편','짧은']);
    const longForm = count(['서사','대하','장편','시리즈','역사']);
    const breathPct = Math.min(95, Math.max(15, Math.round(longForm / Math.max(1, shortForm + longForm) * 100)));

    const traits = [
      { name: '난이도', leftLabel: '가벼운', rightLabel: '깊은', pct: diffPct, color: 'var(--lavender)' },
      { name: '분위기', leftLabel: '어두운', rightLabel: '밝은', pct: moodPct, color: 'var(--pink)' },
      { name: '시선', leftLabel: '사회', rightLabel: '개인', pct: scopePct, color: 'var(--mint)' },
      { name: '장르 폭', leftLabel: '탐험형', rightLabel: '집중형', pct: focusPct, color: 'var(--peach)' },
      { name: '호흡', leftLabel: '짧은', rightLabel: '긴', pct: breathPct, color: 'var(--sky)' }
    ];

    // 별명 생성 (성향 기반)
    let epithet = '';
    if (moodPct > 60 && scopePct > 60) epithet = '따뜻한 이야기를 좋아하는 사색가';
    else if (diffPct > 60 && scopePct < 40) epithet = '세상을 깊이 들여다보는 탐구자';
    else if (moodPct < 40) epithet = '긴장감 있는 이야기를 즐기는 모험가';
    else if (focusPct < 40) epithet = '장르를 넘나드는 호기심 많은 독서가';
    else if (breathPct > 60) epithet = '긴 서사에 빠져드는 몰입형 독서가';
    else epithet = '균형 잡힌 취향의 다정한 독서가';

    return {
      name: '쿼카',
      epithet,
      traits,
      topTags,
      bookCount: books.length
    };
  }
};

/* =============================================
   UI
============================================= */
const UI = {
  currentScreen: 'capture',

  navigate(screenId) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById('screen-' + screenId).classList.add('active');
    document.querySelectorAll('.nav-btn').forEach(b => {
      b.classList.toggle('active', b.dataset.screen === screenId);
    });
    this.currentScreen = screenId;
    if (screenId === 'capture') Camera.start();
    else Camera.stop();
    if (screenId === 'shelf') this.renderShelf();
    if (screenId === 'character') this.renderCharacter();
    if (screenId === 'reco') this.renderReco();
  },

  showLoading(show) {
    document.getElementById('loading').classList.toggle('show', show);
  },

  /* --- Match Result --- */
  showMatch(result, imageData) {
    const chipColors = ['var(--mint)','var(--lavender)','var(--peach)'];
    const el = document.getElementById('match-content');
    el.innerHTML = `
      <p class="match-verdict">"<span class="hl">${result.verdict}</span>"</p>
      <div class="match-stage">
        <div class="match-cover">
          ${imageData ? `<img src="${imageData}" alt="표지">` : `<div class="placeholder" style="background:${randomPastel()}">${result.title}</div>`}
        </div>
        <svg width="110" height="126"><use href="#char-happy"/></svg>
      </div>
      <div class="match-bar-wrap">
        <div class="match-bar-head"><span>쿼카의 취향 일치도</span><span class="score">${result.matchScore}%</span></div>
        <div class="match-bar"><div class="fill" style="width:0%"></div></div>
      </div>
      <div class="match-reasons">
        ${result.matchReasons.map((r, i) => {
          const icons = ['🌙','📖','🏷'];
          const labels = ['분위기','난이도','장르'];
          const colors = ['var(--mint)','var(--lavender)','var(--peach)'];
          return `<div class="match-reason"><span class="chip" style="background:${colors[i]}">${icons[i]} ${labels[i]}</span>${r}</div>`;
        }).join('')}
      </div>
      <div class="match-actions">
        <button class="btn" id="btn-save">읽기 시작</button>
        <button class="btn ghost" id="btn-pass">그래도 패스</button>
      </div>
    `;
    // animate bar
    requestAnimationFrame(() => {
      requestAnimationFrame(() => {
        el.querySelector('.match-bar .fill').style.width = result.matchScore + '%';
      });
    });
    // store result temporarily
    this._pendingBook = { ...result, coverImage: imageData, color: randomPastel(), createdAt: Date.now() };
    document.getElementById('btn-save').onclick = () => this.saveAndGo();
    document.getElementById('btn-pass').onclick = () => this.navigate('capture');
    this.navigate('match');
  },

  async saveAndGo() {
    if (!this._pendingBook) return;
    const book = { ...this._pendingBook, stars: Math.min(5, Math.max(3, Math.round(this._pendingBook.matchScore / 20))), memo: '' };
    delete book.matchReasons; delete book.verdict; delete book.matchScore;
    await DB.saveBook(book);
    this._pendingBook = null;
    // regenerate character
    const books = await DB.getBooks();
    const charData = await AI.generateCharacter(books);
    if (charData) await DB.saveCharacter(charData);
    this.navigate('shelf');
  },

  /* --- Bookshelf --- */
  async renderShelf() {
    const books = await DB.getBooks();
    const countEl = document.getElementById('shelf-count');
    const body = document.getElementById('shelf-body');
    countEl.textContent = books.length > 0 ? `총 ${books.length}권` : '';
    if (books.length === 0) {
      body.innerHTML = '<div class="shelf-empty"><div class="big">📚</div>아직 책이 없어요<br>표지를 찍어서 첫 번째 책을 기록해보세요</div>';
      return;
    }
    const perRow = 7;
    let html = '';
    for (let i = 0; i < books.length; i++) {
      if (i % perRow === 0) html += '<div class="shelf-row">';
      const b = books[i];
      const heights = [82, 88, 94, 100];
      const h = heights[Math.floor(Math.random() * heights.length)];
      html += `<div class="shelf-book" style="background:${b.color || randomPastel()};height:${h}px" data-id="${b.id}"><span class="spine">${b.title}</span></div>`;
      if ((i + 1) % perRow === 0 || i === books.length - 1) html += '</div><div class="shelf-plank"></div>';
    }
    body.innerHTML = html;
    body.querySelectorAll('.shelf-book').forEach(el => {
      el.addEventListener('click', () => this.showBookPopup(+el.dataset.id));
    });
  },

  async showBookPopup(id) {
    const books = await DB.getBooks();
    const book = books.find(b => b.id === id);
    if (!book) return;
    const card = document.getElementById('popup-card');
    card.innerHTML = `
      <button class="popup-close" id="popup-close-btn">✕</button>
      ${book.coverImage
        ? `<div class="popup-cover-img"><img src="${book.coverImage}" alt="${book.title}"></div>`
        : `<div class="popup-cover-color" style="background:${book.color || 'var(--mint)'}">${book.title}</div>`
      }
      <h3 class="popup-title">${book.title}</h3>
      <p class="popup-author">${book.author} · ${book.year}</p>
      <div class="popup-stars">${'★'.repeat(book.stars || 0)}${'☆'.repeat(5 - (book.stars || 0))}</div>
      <div class="popup-tags">${(book.tags || []).map(t => `<span class="tag">#${t}</span>`).join('')}</div>
      ${book.memo ? `<div class="popup-memo"><span class="memo-label">나의 한 줄</span>${book.memo}</div>` : ''}
      <p class="popup-date">${book.createdAt ? new Date(book.createdAt).toLocaleDateString('ko-KR') + ' 기록' : ''}</p>
      <button class="popup-delete" data-id="${book.id}">이 책 삭제</button>
    `;
    document.getElementById('popup-overlay').classList.add('open');
    card.querySelector('#popup-close-btn').onclick = () => this.closePopup();
    card.querySelector('.popup-delete').onclick = async () => {
      await DB.deleteBook(book.id);
      this.closePopup();
      this.renderShelf();
      // regenerate character
      const remaining = await DB.getBooks();
      const charData = await AI.generateCharacter(remaining);
      if (charData) await DB.saveCharacter(charData);
    };
  },

  closePopup() {
    document.getElementById('popup-overlay').classList.remove('open');
  },

  /* --- Character --- */
  async renderCharacter() {
    const body = document.getElementById('char-body');
    const char = await DB.getCharacter();
    if (!char) {
      body.innerHTML = '<div class="char-empty"><div class="big">♡</div>아직 캐릭터가 없어요<br>책을 3권 이상 기록하면<br>나만의 책 친구가 태어나요</div>';
      return;
    }
    body.innerHTML = `
      <div class="char-profile">
        <svg width="130" height="148"><use href="#char-happy"/></svg>
        <div class="name">${char.name}</div>
        <div class="epithet">"${char.epithet}"</div>
        <p class="basis">${char.bookCount}권의 책 기록으로 자라났어요</p>
      </div>
      <div class="char-bars">
        ${(char.traits || []).map(t => `
          <div class="char-bar">
            <span class="label">${t.name}</span>
            <div class="bar-body">
              <span class="bar-side">${t.leftLabel || ''}</span>
              <div class="track"><div class="fill" style="width:${t.pct}%;background:${t.color}"></div></div>
              <span class="bar-side">${t.rightLabel || ''}</span>
            </div>
          </div>
        `).join('')}
      </div>
      <div class="char-tags">${(char.topTags || []).map(t => `<span class="tag">#${t}</span>`).join('')}</div>
    `;
  },

  /* --- Recommendations --- */
  _recoCache: null,
  _recoBooksCount: 0,

  async renderReco() {
    const body = document.getElementById('reco-body');
    const books = await DB.getBooks();
    if (books.length < 2) {
      body.innerHTML = '<div class="reco-empty"><div class="big">☆</div>책을 조금 더 기록하면<br>취향에 맞는 추천을 해드릴게요</div>';
      return;
    }

    // 책 수가 변하지 않았으면 캐시 사용
    if (this._recoCache && this._recoBooksCount === books.length) {
      this._renderRecoCards(body, this._recoCache);
      return;
    }

    // 로딩 표시
    body.innerHTML = '<div class="reco-empty"><svg width="70" height="80" class="loading-anim"><use href="#char-think"/></svg><br><span style="font-size:.82rem;color:var(--text2)">쿼카가 추천 고르는 중...</span></div>';

    const isDeployed = location.hostname !== 'localhost' && location.hostname !== '127.0.0.1' && location.protocol !== 'file:';

    try {
      let recos;
      if (isDeployed) {
        const res = await fetch('/api/recommend', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ books: books.map(b => ({ title: b.title, author: b.author, tags: b.tags })) })
        });
        const data = await res.json().catch(() => null);
        if (!res.ok) throw new Error(data?.error || 'HTTP ' + res.status);
        recos = data;
      } else {
        // Mock
        await new Promise(r => setTimeout(r, 1000));
        recos = [
          { title:'서랍에 저녁을 넣어 두었다', author:'한강', why:'잔잔한 결이 비슷해요' },
          { title:'시선으로부터,', author:'정세랑', why:'따뜻한 가족 이야기' },
          { title:'친애하고, 친애하는', author:'백수린', why:'일상 속 깊은 감정' },
          { title:'방금 떠나온 세계', author:'김초엽', why:'새로운 결로의 확장' },
        ];
      }

      this._recoCache = recos;
      this._recoBooksCount = books.length;
      this._renderRecoCards(body, recos);

    } catch (e) {
      body.innerHTML = `<div class="reco-empty"><div class="big">☆</div>추천을 불러오지 못했어요<br><span style="font-size:.72rem;color:var(--text3)">${e.message}</span></div>`;
    }
  },

  _renderRecoCards(body, recos) {
    const colors = [PASTELS[1], PASTELS[3], PASTELS[2], PASTELS[4], PASTELS[0], PASTELS[5]];
    body.innerHTML = recos.map((r, i) => `
      <div class="reco-card">
        <div class="reco-cover" style="background:${colors[i % colors.length]}">${r.title}</div>
        <div class="reco-body">
          <h4>${r.title}</h4>
          <p class="au">${r.author}</p>
          <p class="why">${r.why}</p>
        </div>
      </div>
    `).join('');
  }
};

/* =============================================
   INIT
============================================= */
(async function init() {
  await DB.open();

  // Navigation
  document.querySelectorAll('.nav-btn').forEach(btn => {
    btn.addEventListener('click', () => UI.navigate(btn.dataset.screen));
  });

  // Camera start
  Camera.start();

  // Shutter
  document.getElementById('shutter-btn').addEventListener('click', async () => {
    const imageData = Camera.capture();
    if (!imageData) return;
    UI.showLoading(true);
    try {
      const result = await AI.analyzeCover(imageData);
      UI.showLoading(false);
      UI.showMatch(result, imageData);
    } catch (e) {
      UI.showLoading(false);
      alert('오류: ' + e.message);
      console.error('Analyze error:', e);
    }
  });

  // Gallery
  document.getElementById('gallery-btn').addEventListener('click', () => {
    document.getElementById('gallery-input').click();
  });
  document.getElementById('gallery-input').addEventListener('change', async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = async (ev) => {
      // Resize
      const img = new Image();
      img.onload = async () => {
        const canvas = document.getElementById('capture-canvas');
        const maxW = 800;
        let w = img.width, h = img.height;
        if (w > maxW) { h = Math.round(h * maxW / w); w = maxW; }
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        const imageData = canvas.toDataURL('image/jpeg', 0.82);
        UI.showLoading(true);
        try {
          const result = await AI.analyzeCover(imageData);
          UI.showLoading(false);
          UI.showMatch(result, imageData);
        } catch (err) {
          UI.showLoading(false);
          alert('오류: ' + err.message);
          console.error('Gallery analyze error:', err);
        }
      };
      img.src = ev.target.result;
    };
    reader.readAsDataURL(file);
    e.target.value = '';
  });

  // Popup close
  document.getElementById('popup-overlay').addEventListener('click', e => {
    if (e.target.id === 'popup-overlay') UI.closePopup();
  });
})();
</script>
